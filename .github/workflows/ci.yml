name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-test:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # packageManager in package.json pins the pnpm version — don't
      # duplicate it here (was breaking every build since March).
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  # Smoke runs in its own job so prod schema invariants are checked on
  # every push even while the main lint/typecheck/test job has pre-existing
  # mobile-app failures. Read-only via service-role REST — no writes. ~30s.
  # Skipped if SB_URL / SB_KEY aren't set (forks / external PRs).
  smoke:
    name: Smoke (prod read-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install scripts/ only
        run: pnpm --filter @mecanix/scripts install

      - name: Smoke
        env:
          SB_URL: ${{ secrets.SB_URL }}
          SB_KEY: ${{ secrets.SB_KEY }}
        run: |
          if [ -z "$SB_URL" ] || [ -z "$SB_KEY" ]; then
            echo "SB_URL / SB_KEY repo secrets not set — skipping smoke"
            exit 0
          fi
          pnpm --filter @mecanix/scripts smoke
